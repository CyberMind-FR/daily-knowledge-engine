name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: pytest
      - run: python -m dke.cli --publication les-cimes --date 2026-07-04 --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: les-cimes-output
          path: dist/
